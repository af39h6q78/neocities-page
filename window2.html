<style>
    body {
        width: 100vw;
        height: 100vh;
    }
    
    .window {
        width: calc(100% - 6px);
        height: calc(100% - 6px);
        display: block;
        box-sizing: border-box;
        max-width: none;
        position: relative;
    }
    
    .window-body {
        margin: 8px;
        padding: 0px;
        height: calc(100% - 60px); /* Adjust based on title bar + menu bar height */
        display: flex;
        flex-direction: column;
        position: relative;
    }
    
    .content-area {
        flex: 1; /* This makes it fill all available space */
        margin: 10px; /* Fixed margin from window-body edges */
        overflow: auto; /* Add scrollbar if content is too long */
    }

</style>
